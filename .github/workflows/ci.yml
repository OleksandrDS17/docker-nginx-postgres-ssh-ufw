name: CI

on:
  push:
    branches: [ main ]

jobs:
  docker-test:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build containers
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for services
        run: sleep 10

      - name: Test API
        run: curl http://localhost/api/health
